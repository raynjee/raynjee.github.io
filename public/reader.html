<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Ἀνέκδοτα — Reader</title>
<style>
  :root {
    --bg: #fafaf9;
    --fg: #1c1917;
    --fg-dim: #78716c;
    --fg-softer: #a8a29e;
    --border: #e7e5e4;
    --max-w: 680px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171412;
      --fg: #e8e4df;
      --fg-dim: #a8a29e;
      --fg-softer: #78716c;
      --border: #2d2824;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 18px; -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.75;
    padding: 32px 16px 80px;
    max-width: var(--max-w);
    margin: 0 auto;
  }
  header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  .book-title {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-softer);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  article { margin-top: 8px; }
  p {
    margin-bottom: 1.1em;
    orphans: 2;
    widows: 2;
  }
  p:first-of-type { margin-top: 0; }
  .scene-break {
    text-align: center;
    margin: 1.5em 0;
    color: var(--fg-softer);
    font-size: 14px;
    letter-spacing: 0.15em;
  }
  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    font-size: 14px;
    z-index: 10;
  }
  .nav button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--fg);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: background 0.15s;
  }
  .nav button:hover { background: var(--border); }
  .nav button:disabled { opacity: 0.35; pointer-events: none; }
  .nav .location { color: var(--fg-dim); font-size: 13px; }
  .error-state {
    text-align: center;
    padding: 48px 16px;
    color: var(--fg-dim);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    font-size: 16px;
  }
</style>
</head>
<body>
<script>
// Read chapter data from localStorage (set by the main app).
// This runs synchronously before the body renders, so Safari's
// article scanner sees the content in the initial DOM — Reader
// Mode requires content present at page load, not JS-injected.
(function () {
  var KEY = "atelier.safariReader";
  var raw = localStorage.getItem(KEY);
  if (!raw) {
    document.write('<div class="error-state">No chapter data found.<br><small>Open a book in Ἀνέκδοτα and tap 🌐 Safari Reader.</small></div>');
    return;
  }

  var data;
  try { data = JSON.parse(raw); } catch(e) {
    document.write('<div class="error-state">Could not load chapter data.<br><small>Try reopening from your library.</small></div>');
    return;
  }

  var chapters = data.chapters || [];
  var bookTitle = data.bookTitle || "";
  var startIdx = 0;

  // Determine starting chapter from URL fragment
  var h = window.location.hash;
  var m = h.match(/^#chapter=(\d+)$/);
  if (m) {
    startIdx = parseInt(m[1], 10);
    if (startIdx < 0 || startIdx >= chapters.length) startIdx = 0;
  } else if (typeof data.startIndex === "number") {
    startIdx = data.startIndex;
  }

  if (!chapters.length) {
    document.write('<div class="error-state">This book has no chapters.</div>');
    return;
  }

  // Attach data to window for nav functions below
  window.__readerData = { chapters: chapters, bookTitle: bookTitle, currentIdx: startIdx };

  // Render the initial chapter into the DOM synchronously
  var ch = chapters[startIdx];
  document.title = bookTitle + " — Chapter " + (startIdx + 1);

  // Build <link> elements for Safari auto-advance
  var nextLink = "";
  var prevLink = "";
  if (startIdx < chapters.length - 1) {
    nextLink = '<link rel="next" href="#chapter=' + (startIdx + 1) + '">';
  }
  if (startIdx > 0) {
    prevLink = '<link rel="prev" href="#chapter=' + (startIdx - 1) + '">';
  }
  document.write(nextLink + prevLink);

  // Escape helper
  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Build chapter content
  var contentHtml = "";
  for (var i = 0; i < ch.paragraphs.length; i++) {
    var p = ch.paragraphs[i].trim();
    if (!p) continue;

    // Scene break detection
    if (p === "***" || p === "* * *" || /^[\s]*\*[\s]*\*[\s]*\*[\s]*$/.test(p) || /^\s*[*·]{2,}\s*$/.test(p)) {
      contentHtml += '<div class="scene-break">· · ·</div>';
      continue;
    }

    contentHtml += "<p>" + esc(p) + "</p>";
  }

  // Write the full page HTML
  document.write(
    '<header>' +
      '<div class="book-title">' + esc(bookTitle) + '</div>' +
      '<h1 id="chapterTitle">' + esc(ch.title) + '</h1>' +
    '</header>' +
    '<article id="content">' + contentHtml + '</article>' +
    '<nav class="nav">' +
      '<button id="prevBtn"' + (startIdx <= 0 ? ' disabled' : '') + '>← Previous</button>' +
      '<span class="location" id="locationLabel">Ch. ' + (startIdx + 1) + ' / ' + chapters.length + '</span>' +
      '<button id="nextBtn"' + (startIdx >= chapters.length - 1 ? ' disabled' : '') + '>Next →</button>' +
    '</nav>'
  );
})();
</script>
<script>
// Navigation — runs after DOM is fully written
(function () {
  var d = window.__readerData;
  if (!d) return;
  var chapters = d.chapters;
  var bookTitle = d.bookTitle;

  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function renderChapter(idx) {
    if (idx < 0 || idx >= chapters.length) return;
    d.currentIdx = idx;
    var ch = chapters[idx];

    // Update title
    document.title = bookTitle + " — Chapter " + (idx + 1);
    document.getElementById("chapterTitle").textContent = ch.title;

    // Build content HTML
    var html = "";
    for (var i = 0; i < ch.paragraphs.length; i++) {
      var p = ch.paragraphs[i].trim();
      if (!p) continue;
      if (p === "***" || p === "* * *" || /^[\s]*\*[\s]*\*[\s]*\*[\s]*$/.test(p) || /^\s*[*·]{2,}\s*$/.test(p)) {
        html += '<div class="scene-break">· · ·</div>';
        continue;
      }
      html += "<p>" + esc(p) + "</p>";
    }
    document.getElementById("content").innerHTML = html;

    // Update nav
    var prevBtn = document.getElementById("prevBtn");
    var nextBtn = document.getElementById("nextBtn");
    var locLabel = document.getElementById("locationLabel");
    locLabel.textContent = "Ch. " + (idx + 1) + " / " + chapters.length;

    // Update <link> tags for Safari Reader Mode auto-advance
    var links = document.head.querySelectorAll('link[rel="next"], link[rel="prev"]');
    for (var j = 0; j < links.length; j++) links[j].remove();

    if (idx < chapters.length - 1) {
      var nl = document.createElement("link");
      nl.rel = "next";
      nl.href = "#chapter=" + (idx + 1);
      document.head.appendChild(nl);
      nextBtn.disabled = false;
    } else {
      nextBtn.disabled = true;
    }

    if (idx > 0) {
      var pl = document.createElement("link");
      pl.rel = "prev";
      pl.href = "#chapter=" + (idx - 1);
      document.head.appendChild(pl);
      prevBtn.disabled = false;
    } else {
      prevBtn.disabled = true;
    }

    window.scrollTo({ top: 0, behavior: "instant" });
  }

  function navigateTo(idx) {
    if (idx < 0 || idx >= chapters.length) return;
    window.location.hash = "chapter=" + idx;
    renderChapter(idx);
  }

  // Wire up buttons
  document.getElementById("prevBtn").onclick = function () {
    if (d.currentIdx > 0) navigateTo(d.currentIdx - 1);
  };
  document.getElementById("nextBtn").onclick = function () {
    if (d.currentIdx < chapters.length - 1) navigateTo(d.currentIdx + 1);
  };

  // Hash change handler (Safari auto-advance follows <link rel="next">)
  window.addEventListener("hashchange", function () {
    var m = window.location.hash.match(/^#chapter=(\d+)$/);
    if (m) {
      var idx = parseInt(m[1], 10);
      if (idx >= 0 && idx < chapters.length) renderChapter(idx);
    }
  });

  // Keyboard navigation
  window.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight" || e.key === "ArrowDown") {
      if (d.currentIdx < chapters.length - 1) navigateTo(d.currentIdx + 1);
    } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
      if (d.currentIdx > 0) navigateTo(d.currentIdx - 1);
    }
  });
})();
</script>
</body>
</html>
